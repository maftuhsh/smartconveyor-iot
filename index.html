<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Conveyor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { background: radial-gradient(circle at top right, #1e3a8a 0%,transparent 25%), radial-gradient(circle at bottom left, #0891b2 0%,transparent 25%), #0f172a; color:white; min-height:100vh; overflow-x:hidden; padding:20px; }
    .container { width:100%; max-width:1400px; margin:auto; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; flex-wrap:wrap; gap:20px; }
    .title h1 { font-size:2rem; font-weight:700; }
    .title p { color:#94a3b8; margin-top:5px; }
    .status { display:flex; align-items:center; gap:10px; background:rgba(30,41,59,0.8); padding:12px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(10px); }
    .dot { width:12px; height:12px; border-radius:50%; background:#ef4444; box-shadow:0 0 10px #ef4444; transition:0.3s; }
    .dot.connected { background:#22c55e; box-shadow:0 0 12px #22c55e; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap:20px; margin-bottom:25px; }
    .card { background:rgba(30,41,59,0.75); backdrop-filter:blur(14px); border-radius:24px; padding:24px; border:1px solid rgba(255,255,255,0.08); position:relative; overflow:hidden; }
    .card::before { content:""; position:absolute; top:0; left:0; width:100%; height:5px; background: linear-gradient(90deg, #06b6d4, #3b82f6); }
    .card-title { font-size:1rem; color:#94a3b8; margin-bottom:12px; font-weight:500; }
    .card-value { font-size:2.5rem; font-weight:700; line-height:1; }
    .big-card { background:rgba(30,41,59,0.75); border-radius:24px; padding:24px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(14px); margin-bottom:25px; }
    .big-title { font-size:1.2rem; margin-bottom:20px; font-weight:600; }
    .logs { max-height:350px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
    .log-item { background:#0f172a; padding:14px; border-radius:14px; border-left:4px solid #38bdf8; }
    .log-time { font-size:0.8rem; color:#94a3b8; margin-bottom:5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title"><h1>Smart Conveyor Dashboard</h1><p>IoT Monitoring System • MQTT & Sheets Sync</p></div>
      <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Disconnected</span></div>
    </div>
    <div class="grid">
      <div class="card"><div class="card-title">Total Barang</div><div class="card-value" id="totalBarang">0</div></div>
      <div class="card"><div class="card-title">Logam (Qty / %)</div><div class="card-value" id="valLogam" style="color: #22c55e;">0 / 0%</div></div>
      <div class="card"><div class="card-title">Non Logam (Qty / %)</div><div class="card-value" id="valNonLogam" style="color: #f59e0b;">0 / 0%</div></div>
      <div class="card"><div class="card-title">Last Detection</div><div class="card-value" id="lastDetect" style="font-size: 1.8rem;">-</div></div>
      <div class="card"><div class="card-title">System Uptime</div><div class="card-value" id="uptime">00:00:00</div></div>
      <div class="card"><div class="card-title">MQTT Status</div><div class="card-value" id="mqttStatus" style="color: #ef4444;">OFFLINE</div></div>
    </div>
    <div class="big-card">
      <div class="big-title">Material Distribution</div>
      <canvas id="myChart" style="max-height: 300px;"></canvas>
    </div>
    <div class="big-card">
      <div class="big-title">Realtime Activity Logs</div>
      <div class="logs" id="logs"></div>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_ID = "AKfycbxcTcoVDLo5l3dCTiF5I_JVlrTYW_MNVSjfrcoZHNNKitjNtE-oBZ_miRs1KrXeb9Di";
    let valTotal = 0, valLogam = 0, valNonLogam = 0, startTime = Date.now(), syncTimeout = null;
    let lastEventTime = 0; 
    
    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Logam', 'Non Logam'], datasets: [{ data: [1, 1], backgroundColor: ['#22c55e', '#f59e0b'] }] }, options: { responsive: true, maintainAspectRatio: false } });

    setInterval(() => {
      let d = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById("uptime").innerText = `${Math.floor(d/3600).toString().padStart(2,'0')}:${Math.floor((d%3600)/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`;
    }, 1000);

    const client = mqtt.connect("wss://589230614b1342099527d504f560a5ef.s1.eu.hivemq.cloud:8884/mqtt", { 
        username: "smartconveyor-iot", password: "Mesinelektro123", reconnectPeriod: 2000, clientId: "dash_" + Math.random().toString(16).substr(2,8) 
    });

    client.on("connect", () => {
      document.getElementById("statusDot").classList.add("connected");
      document.getElementById("statusText").innerText = "Connected";
      document.getElementById("mqttStatus").innerText = "ONLINE";
      document.getElementById("mqttStatus").style.color = "#22c55e";
      client.subscribe(["smartconveyor/totalbarang", "smartconveyor/logam", "smartconveyor/nonlogam"]);
      addLog("System Connected");
    });

    client.on("message", (topic, msg) => {
      let v = parseInt(msg.toString());
      if (isNaN(v)) return;

      // Update variabel internal
      if (topic === "smartconveyor/totalbarang") valTotal = v;
      else if (topic === "smartconveyor/logam") valLogam = v;
      else if (topic === "smartconveyor/nonlogam") valNonLogam = v;

      // Update UI untuk Total Barang
      document.getElementById("totalBarang").innerText = valTotal;

      // Update UI Last Detection dengan Debounce
      if (topic === "smartconveyor/logam" || topic === "smartconveyor/nonlogam") {
        if (Date.now() - lastEventTime > 800) {
          if (topic === "smartconveyor/logam") {
            document.getElementById("lastDetect").innerText = "LOGAM";
            document.getElementById("lastDetect").style.color = "#22c55e";
            addLog("DETEKSI: LOGAM");
          } else {
            document.getElementById("lastDetect").innerText = "NON LOGAM";
            document.getElementById("lastDetect").style.color = "#f59e0b";
            addLog("DETEKSI: NON LOGAM");
          }
          lastEventTime = Date.now();
        }
      }

      // Update Kalkulasi Persentase
      let pL = valTotal > 0 ? Math.round((valLogam / valTotal) * 100) : 0;
      let pNL = valTotal > 0 ? Math.round((valNonLogam / valTotal) * 100) : 0;
      document.getElementById("valLogam").innerText = `${valLogam} / ${pL}%`;
      document.getElementById("valNonLogam").innerText = `${valNonLogam} / ${pNL}%`;
      
      // Update Chart
      chart.data.datasets[0].data = [valLogam || 1, valNonLogam || 1];
      chart.update();

      // Sync ke Google Sheets (Debounce 1 detik agar tidak spam)
      clearTimeout(syncTimeout);
      syncTimeout = setTimeout(() => {
        new Image().src = `https://script.google.com/macros/s/${GOOGLE_SCRIPT_ID}/exec?barang=${valTotal}&logam=${valLogam}&nonlogam=${valNonLogam}`;
      }, 1000);
    });

    function addLog(text) {
      const logs = document.getElementById("logs");
      const item = document.createElement("div");
      item.className = "log-item";
      item.innerHTML = `<div class="log-time">${new Date().toLocaleTimeString()}</div><div>${text}</div>`;
      logs.prepend(item);
      if(logs.children.length > 50) logs.removeChild(logs.lastChild);
    }
  </script>
</body>
</html>
