<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Conveyor Dashboard</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0f172a; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
    .container { max-width: 1000px; margin: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: rgba(30,41,59,0.7); padding: 20px; border-radius: 20px; border: 1px solid #334155; text-align: center; }
    .card-value { font-size: 2.5rem; font-weight: 700; color: #38bdf8; }
    .big-card { background: rgba(30,41,59,0.7); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    canvas { width: 100% !important; height: 300px !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" style="margin-bottom: 20px;">
      <h1>Smart Conveyor Dashboard</h1>
      <p id="mqttStatus" style="color: #ef4444;">Status: OFFLINE</p>
    </div>

    <div class="grid">
      <div class="card"><div class="card-title">Total</div><div class="card-value" id="totalBarang">0</div></div>
      <div class="card"><div class="card-title">Logam</div><div class="card-value" id="logam" style="color: #22c55e;">0</div></div>
      <div class="card"><div class="card-title">Non-Logam</div><div class="card-value" id="nonlogam" style="color: #f59e0b;">0</div></div>
    </div>

    <div class="big-card">
      <canvas id="myChart"></canvas>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_ID = "AKfycbxcTcoVDLo5l3dCTiF5I_JVlrTYW_MNVSjfrcoZHNNKitjNtE-oBZ_miRs1KrXeb9Di";
    let curL = 0, curNL = 0;

    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: ['Logam', 'Non-Logam'], datasets: [{ label: 'Jumlah Barang', data: [0, 0], backgroundColor: ['#22c55e', '#f59e0b'] }] },
      options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } }, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
    });

    const client = mqtt.connect("wss://589230614b1342099527d504f560a5ef.s1.eu.hivemq.cloud:8884/mqtt", {
      username: "smartconveyor-iot", password: "Mesinelektro123", clientId: "dashboard_" + Math.random().toString(16).substr(2,8)
    });

    client.on("connect", () => {
      document.getElementById("mqttStatus").innerText = "Status: ONLINE";
      document.getElementById("mqttStatus").style.color = "#22c55e";
      client.subscribe(["smartconveyor/totalbarang", "smartconveyor/logam", "smartconveyor/nonlogam"]);
    });

    client.on("message", (topic, message) => {
      const val = parseInt(message.toString());
      if(topic === "smartconveyor/totalbarang") document.getElementById("totalBarang").innerText = val;
      if(topic === "smartconveyor/logam") { document.getElementById("logam").innerText = val; curL = val; }
      if(topic === "smartconveyor/nonlogam") { document.getElementById("nonlogam").innerText = val; curNL = val; }
      
      // Update Chart
      myChart.data.datasets[0].data = [curL, curNL];
      myChart.update();
      
      // Kirim ke Sheets via Image (Paling Stabil)
      new Image().src = `https://script.google.com/macros/s/${GOOGLE_SCRIPT_ID}/exec?barang=${document.getElementById("totalBarang").innerText}&logam=${curL}&nonlogam=${curNL}`;
    });
  </script>
</body>
</html>
