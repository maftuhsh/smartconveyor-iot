<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Conveyor Pro Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #0f172a; --card: rgba(30,41,59,0.7); --accent: #38bdf8; }
    body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
    .container { max-width: 1200px; margin: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; text-align: center; }
    .chart-container { background: var(--card); padding: 20px; border-radius: 20px; height: 300px; display: flex; align-items: center; justify-content: center; }
    .big-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; }
    .val { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .logs { background: var(--card); padding: 20px; border-radius: 20px; max-height: 200px; overflow-y: auto; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Conveyor Pro</h1>
    <div class="grid" style="margin-top:20px;">
      <div class="card"><div class="big-title">Doughnut Chart</div><div class="chart-container"><canvas id="myChart"></canvas></div></div>
      <div class="card">
        <div class="big-title">Stats</div>
        <div class="val" id="percLogam">0%</div><p>Logam</p>
        <div class="val" id="percNonLogam" style="color:#f59e0b; margin-top:10px;">0%</div><p>Non-Logam</p>
      </div>
      <div class="card">
        <div class="big-title">System Info</div>
        <div class="val" id="uptime" style="font-size:1.5rem;">00:00:00</div><p>Uptime</p>
        <div class="val" id="lastDetect" style="font-size:1rem; margin-top:10px;">-</div><p>Last Detection</p>
      </div>
    </div>
    <div class="logs" id="logs">Activity Logs...</div>
  </div>

  <script>
    const GOOGLE_SCRIPT_ID = "AKfycbxcTcoVDLo5l3dCTiF5I_JVlrTYW_MNVSjfrcoZHNNKitjNtE-oBZ_miRs1KrXeb9Di";
    let logam = 0, nonLogam = 0, startTime = Date.now();

    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: ['Logam', 'Non-Logam'], datasets: [{ data: [0, 1], backgroundColor: ['#22c55e', '#f59e0b'] }] }
    });

    // Uptime Counter
    setInterval(() => {
      let diff = Math.floor((Date.now() - startTime) / 1000);
      let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
      document.getElementById("uptime").innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);

    const client = mqtt.connect("wss://589230614b1342099527d504f560a5ef.s1.eu.hivemq.cloud:8884/mqtt", { username: "smartconveyor-iot", password: "Mesinelektro123" });

    client.on("message", (topic, msg) => {
      let val = parseInt(msg.toString());
      if(topic.includes("logam")) logam = val;
      if(topic.includes("nonlogam")) nonLogam = val;

      let total = logam + nonLogam;
      let pL = total ? Math.round((logam/total)*100) : 0;
      let pNL = total ? Math.round((nonLogam/total)*100) : 0;

      document.getElementById("percLogam").innerText = pL + "%";
      document.getElementById("percNonLogam").innerText = pNL + "%";
      document.getElementById("lastDetect").innerText = new Date().toLocaleTimeString();
      
      chart.data.datasets[0].data = [logam || 1, nonLogam || 1];
      chart.update();
      addLog(`${topic.split('/')[1]}: ${val}`);
      
      // Google Sheets Sync
      new Image().src = `https://script.google.com/macros/s/${GOOGLE_SCRIPT_ID}/exec?barang=${total}&logam=${logam}&nonlogam=${nonLogam}`;
    });

    client.on("connect", () => { client.subscribe(["smartconveyor/logam", "smartconveyor/nonlogam"]); addLog("Connected!"); });

    function addLog(txt) {
      const logs = document.getElementById("logs");
      logs.innerHTML = `<div class="log-item">[${new Date().toLocaleTimeString()}] ${txt}</div>` + logs.innerHTML;
    }
  </script>
</body>
</html>
